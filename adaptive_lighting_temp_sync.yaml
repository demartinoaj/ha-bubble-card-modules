adaptive_lighting_temp_sync:
  name: Adaptive Lighting Temp Sync
  version: '1.1'
  author: Andrew DeMartino
  description: Set light card color to match adaptive lighting color temperature. Card color temperature will change throughout the day as adaptive lighting color temperature does.
  type: Module
  editor: ''
  supported:
    - button
  creator: Andrew DeMartino
  link: ''
  imageUrl: ''
  code: |2-
      /* Slider */
      .bubble-range-fill {
        background-color: ${
          'rgb(' + hass.states['sensor.adaptive_lighting_current_rgb_color'].state + ')' 
        } !important;
        opacity: 0.6 !important; /* add opacity to look nicer */
        filter: saturate(1.0); /* boost saturation to look nicer */
      }

      /* Icon */
      .bubble-icon {
        color: ${
          state === 'on' 
          ? 'rgb(' + hass.states['sensor.adaptive_lighting_current_rgb_color'].state + ')' 
          : 'var(--primary-text-color)'
        } !important;
      }
  is_global: true
